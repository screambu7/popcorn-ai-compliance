services:
  mysql:
    image: mysql:8.0
    container_name: popcorn_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-popcorn_compliance}
      MYSQL_USER: ${DB_USERNAME:-popcorn}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - popcorn

  redis:
    image: redis:7-alpine
    container_name: popcorn_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - popcorn

  n8n:
    image: n8nio/n8n:latest
    container_name: popcorn_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.popcorn.mx
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.popcorn.mx/
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_HOST=mysql
      - DB_MYSQLDB_PORT=3306
      - DB_MYSQLDB_DATABASE=n8n
      - DB_MYSQLDB_USER=${DB_USERNAME:-popcorn}
      - DB_MYSQLDB_PASSWORD=${DB_PASSWORD:-secret}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme_in_production}
      - GENERIC_TIMEZONE=America/Mexico_City
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - mysql
      - redis
    networks:
      - popcorn

  # Opcional: phpMyAdmin para desarrollo local
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: popcorn_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - popcorn
    profiles:
      - dev

volumes:
  mysql_data:
  redis_data:
  n8n_data:

networks:
  popcorn:
    driver: bridge
